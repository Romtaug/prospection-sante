name: Build base sante

# Construit la base complete a partir des sources ouvertes, la COMMIT dans data/
# et la publie aussi en artefact.
# - Planifie : le 1er de chaque mois (SIRENE API + FINESS + fusion).
# - Manuel   : possibilite de sauter SIRENE (base FINESS seule, rapide) ou de
#              restreindre a quelques departements.
# L'enrichissement (emails, scraping des sites) n'est PAS lance ici : depuis une IP
# de datacenter trop de sites bloquent. Lance `python enrich.py` en local.
#
# /!\ Le commit necessite les droits d'ecriture du workflow :
#     Settings > Actions > General > Workflow permissions > "Read and write permissions".

on:
  schedule:
    - cron: "0 3 1 * *"        # 1er du mois, 03:00 UTC
  workflow_dispatch:
    inputs:
      skip_sirene:
        description: "Sauter SIRENE (base FINESS seule, rapide) ?"
        type: boolean
        default: false
      departements:
        description: "Departements ex '69 38 01' (vide = France entiere)"
        required: false

permissions:
  contents: write              # necessaire pour committer le CSV dans le repo

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      # Collecte SIRENE (API). Peut durer ~30 a 60 min a l'echelle nationale.
      - name: SIRENE (API)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_sirene) }}
        run: python sirene_api.py ${{ inputs.departements && format('--departements {0}', inputs.departements) || '' }}

      - name: FINESS
        run: python finess_ingest.py --download ${{ inputs.departements && format('--departements {0}', inputs.departements) || '' }}

      - name: Fusion
        run: python build_base.py

      - name: Commit du CSV dans data/
        run: |
          mkdir -p data
          cp base_sante.csv data/base_sante.csv
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/base_sante.csv
          if git diff --staged --quiet; then
            echo "Base inchangee, rien a committer."
          else
            git commit -m "Refresh base sante ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main || true
            git push
          fi

      - name: Publier aussi en artefact
        uses: actions/upload-artifact@v4
        with:
          name: base_sante
          path: base_sante.csv
          if-no-files-found: error
