name: Refresh base sante

# Rafraichit la base a partir des sources ouvertes.
# - Planifie : le 1er de chaque mois (FINESS + fusion, rapide).
# - Manuel  : peut aussi lancer la collecte SIRENE via l'API (plus long).
# L'enrichissement (scraping des sites) n'est PAS lance ici : depuis une IP de
# datacenter, trop de sites bloquent. Lance `enrich.py` en local.

on:
  schedule:
    - cron: "0 4 1 * *"        # 1er du mois, 04:00 UTC
  workflow_dispatch:
    inputs:
      sirene_api:
        description: "Lancer aussi la collecte SIRENE via API ? (long)"
        type: boolean
        default: false
      departements:
        description: "Departements ex '69 38 01' (vide = France entiere)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: SIRENE (API, sur demande)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sirene_api }}
        run: python sirene_api.py ${{ inputs.departements && format('--departements {0}', inputs.departements) || '' }}

      - name: FINESS
        run: python finess_ingest.py --download ${{ inputs.departements && format('--departements {0}', inputs.departements) || '' }}

      - name: Fusion
        run: python build_base.py

      - name: Publier la base en artefact
        uses: actions/upload-artifact@v4
        with:
          name: base_sante
          path: base_sante.csv
          if-no-files-found: error
