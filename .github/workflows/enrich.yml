name: Enrichissement base sante

# Enrichit la base ENTIEREMENT via GitHub, avec reprise automatique :
#  - phase 1 : fiche officielle (API) des lignes pas encore traitees
#  - phase 2 : contacts web (site, email generique, LinkedIn) des lignes fichees
# L'avancement est sauvegarde a chaque run sur la branche "enrichi" du repo
# (fichier data/base_sante_enrichi.csv.gz, compresse pour tenir sous la limite
# GitHub de 100 Mo). Le CSV lisible est aussi publie en artefact a chaque run.
#
# - Planifie : chaque nuit a 01:00 UTC (s'arrete tout seul quand tout est fait).
# - Manuel   : Run workflow, avec mode / volumes / filtres.
#
# NOTE : depuis les IP GitHub, le taux d'emails trouves est plus faible qu'en
# local (certains sites bloquent les datacenters). Rien ne casse pour autant.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Quelles phases lancer"
        type: choice
        options: [complet, fiche, web]
        default: complet
      limit:
        description: "Lignes a ficher ce run (phase 1)"
        default: "50000"
      web_limit:
        description: "Lignes a completer en web ce run (phase 2)"
        default: "10000"
      types:
        description: "Filtre types ex 'soins laboratoire' (vide = tous)"
        required: false
      departements:
        description: "Filtre departements ex '69 38 01' (vide = tous)"
        required: false
      bodacc:
        description: "Ajouter les signaux BODACC (phase 1, plus lent)"
        type: boolean
        default: false

concurrency:
  group: enrichissement
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Recuperer l'avancement precedent (branche enrichi)
        run: |
          mkdir -p data
          git fetch origin enrichi 2>/dev/null && \
            git checkout origin/enrichi -- data/base_sante_enrichi.csv.gz 2>/dev/null && \
            echo "avancement recupere" || echo "premier run (aucun avancement)"

      - name: Phase 1 - fiche officielle
        if: ${{ inputs.mode != 'web' }}
        timeout-minutes: 200
        continue-on-error: true
        run: >
          python enrich.py --sans-web
          --limit ${{ inputs.limit || '50000' }}
          --out data/base_sante_enrichi.csv.gz
          ${{ inputs.types && format('--types {0}', inputs.types) || '' }}
          ${{ inputs.departements && format('--departements {0}', inputs.departements) || '' }}
          ${{ inputs.bodacc && '--bodacc' || '' }}

      - name: Phase 2 - contacts web
        if: ${{ inputs.mode != 'fiche' }}
        timeout-minutes: 110
        continue-on-error: true
        run: >
          python enrich.py --completer-web --workers 16
          --limit ${{ inputs.web_limit || '10000' }}
          --out data/base_sante_enrichi.csv.gz
          ${{ inputs.types && format('--types {0}', inputs.types) || '' }}
          ${{ inputs.departements && format('--departements {0}', inputs.departements) || '' }}

      - name: Avancement
        if: ${{ always() }}
        run: |
          python enrich.py --stats --out data/base_sante_enrichi.csv.gz 2> data/enrichi_avancement.txt || true
          cat data/enrichi_avancement.txt

      - name: Sauvegarder sur la branche enrichi
        if: ${{ always() }}
        run: |
          [ -f data/base_sante_enrichi.csv.gz ] || { echo "rien a sauvegarder"; exit 0; }
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B enrichi
          git add -f data/base_sante_enrichi.csv.gz data/enrichi_avancement.txt
          git commit -m "Enrichissement $(date -u +%F)" || echo "rien a committer"
          git push -f origin enrichi

      - name: Preparer le CSV lisible (artefact)
        if: ${{ always() }}
        run: |
          python - << 'EOF'
          import gzip, shutil, os
          if os.path.exists("data/base_sante_enrichi.csv.gz"):
              with gzip.open("data/base_sante_enrichi.csv.gz", "rb") as s, open("base_sante_enrichi.csv", "wb") as d:
                  shutil.copyfileobj(s, d)
          EOF

      - name: Publier le CSV enrichi en artefact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: base_sante_enrichi
          path: base_sante_enrichi.csv
          if-no-files-found: warn
